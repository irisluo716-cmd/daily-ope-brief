name: daily-ope-brief
on:
  schedule:
    - cron: "0 22 * * *"      # 北京时间次日 06:00
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - env:
          YOUTUBE_API_KEY: ${{ secrets.AIzaSyCR8eOC36II5RzpSpIu6Sznwg_1PLpBPRk }}
          REDDIT_FEED_URL: ${{ secrets.https://www.reddit.com/.rss?feed=c7e077c384c9da8c7de86b4699e895f29bfa3e2a&user=Icy-Willingness4690 }}
        run: python collect.py
      - run: |
          git config user.name  "ope-brief-bot"
          git config user.email "ope-brief-bot@users.noreply.github.com"
          git add briefs/
          git commit -m "chore: 每日素材 $(date -u +%F)" || echo "无变更"
          git push
