name: daily-ope-brief
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_FEED_URL: ${{ secrets.REDDIT_FEED_URL }}
        run: python collect.py
      - run: |
          git config user.name  "ope-brief-bot"
          git config user.email "ope-brief-bot@users.noreply.github.com"
          git add briefs/
          git commit -m "chore: daily material $(date -u +%F)" || echo "no changes"
          git push
